<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Join Our Restful Community | Lullaby Lark</title>
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/rtl.css">
</head>
<body class="bg-light auth-page">

    <!-- Theme & RTL Toggles (Fixed Top Right) -->
    <div class="position-fixed top-0 end-0 m-3 m-md-4 z-3 d-flex gap-2">
        <div id="rtl-toggle" class="icon-btn shadow-sm rounded-circle d-flex align-items-center justify-content-center" style="width: 45px; height: 45px; cursor: pointer;">
            <i class="bi bi-arrow-left-right"></i>
        </div>
        <div id="theme-toggle" class="icon-btn bg-white shadow-sm rounded-circle d-flex align-items-center justify-content-center" style="width: 45px; height: 45px; cursor: pointer;">
            <i class="bi bi-moon"></i>
        </div>
    </div>

    <div class="container px-3 px-md-4 py-5 py-md-8 min-vh-100 d-flex flex-column align-items-center justify-content-center">
        
        <div class="card auth-card p-4 p-md-5 border-0 shadow-lg rounded-5 bg-white max-w-600 w-100 animate-on-scroll">
            <div class="text-center mb-4 mb-md-5">
                <a href="index.html" class="navbar-brand fs-2 mb-2 d-inline-flex align-items-center justify-content-center gap-2">
                    <i class="bi bi-moon-stars-fill"></i>
                    <span class="fs-3">Lullaby Lark</span>
                </a>
                <h1 class="h4 fw-bold">Let's Get Your Baby Sleeping</h1>
                <p class="text-gray small">Join the community and start your journey today.</p>
            </div>
            <div class="social-login d-grid d-sm-flex gap-2 mb-4">
                <button class="btn btn-outline-secondary w-100 rounded-pill d-flex align-items-center justify-content-center gap-2 py-2 py-md-3 small"><i class="bi bi-google"></i> Google</button>
                <button class="btn btn-outline-secondary w-100 rounded-pill d-flex align-items-center justify-content-center gap-2 py-2 py-md-3 small"><i class="bi bi-apple"></i> Apple</button>
            </div>

            <div class="divider d-flex align-items-center gap-3 mb-4 opacity-25">
                 <div class="flex-grow-1 border-top"></div>
                 <div class="small">OR</div>
                 <div class="flex-grow-1 border-top"></div>
            </div>

            <form action="dashboard.html" class="needs-validation" novalidate>
                 <div class="mb-3 mb-md-4">
                     <label class="form-label fw-bold small">First Name</label>
                     <input type="text" class="form-control rounded-pill p-3 px-4 bg-light border-0 shadow-none" placeholder="First Name" required>
                 </div>
                 <div class="mb-3 mb-md-4">
                     <label class="form-label fw-bold small">Last Name</label>
                     <input type="text" class="form-control rounded-pill p-3 px-4 bg-light border-0 shadow-none" placeholder="Last Name" required>
                 </div>
                 <div class="mb-3 mb-md-4">
                     <label class="form-label fw-bold small">Email Address</label>
                     <input type="email" class="form-control rounded-pill p-3 px-4 bg-light border-0 shadow-none" placeholder="parent@example.com" required>
                 </div>
                 <div class="mb-3 mb-md-4">
                     <label class="form-label fw-bold small">Create Password</label>
                     <div class="position-relative">
                         <input type="password" class="form-control rounded-pill p-3 px-4 bg-light border-0 shadow-none" placeholder="••••••••" required>
                         <button type="button" class="btn position-absolute top-50 end-0 translate-middle-y border-0 bg-transparent pe-4 toggle-password" aria-label="Toggle password visibility">
                             <i class="bi bi-eye text-gray"></i>
                         </button>
                     </div>
                 </div>
                 <div class="mb-4 mb-md-5">
                      <div class="form-check">
                         <input type="checkbox" class="form-check-input" id="termsAgree" required>
                         <label class="form-check-label small" for="termsAgree">I agree to the <a href="#" class="text-decoration-none auth-link">Terms</a> and <a href="#" class="text-decoration-none auth-link">Privacy</a>.</label>
                      </div>
                 </div>
                 <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill py-3">Create Free Account</button>
                 <div class="text-center mt-4 small">
                       <span class="text-gray">Already have an account?</span>
                       <a href="login.html" class="text-decoration-none fw-bold ps-2 auth-link">Login Now</a>
                 </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
